<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranki</title>
  <style>
    :root {
      --accent-color: #f4cea1;
      --accent-color-muted-bg: #3b2f23;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      color: #ffffff;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      letter-spacing: 0.02em;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    /* ── Search ── */
    .search-wrapper {
      position: relative;
      max-width: 560px;
      margin: 0 auto 2rem;
    }

    #search-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #ffffff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #search-input:focus {
      border-color: var(--accent-color);
    }

    #search-input::placeholder { color: #7a7d9a; }

    /* ── Dropdown ── */
    #dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      overflow: hidden;
      z-index: 100;
      display: none;
      max-height: 320px;
      overflow-y: auto;
    }

    #dropdown.visible { display: block; }

    .dropdown-item {
      padding: 0.65rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid #293548;
      transition: background 0.15s;
    }

    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: #253352; }

    .dropdown-item .item-name {
      color: #ffffff;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .dropdown-item .item-meta {
      color: #94a3b8;
      font-size: 0.8rem;
      margin-top: 2px;
    }

    .dropdown-item .item-score {
      float: right;
      color: var(--accent-color);
      font-weight: 700;
      font-size: 0.9rem;
    }

    #dropdown-status {
      padding: 0.65rem 1rem;
      color: #94a3b8;
      font-size: 0.85rem;
      text-align: center;
    }

    /* ── Author Card ── */
    #author-card {
      max-width: 860px;
      margin: 0 auto;
      display: none;
    }

    #author-card.visible { display: block; }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      color: #ffffff;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .card .institution {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
    }

    .stats-row {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-label {
      color: #64748b;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stat-value {
      color: var(--accent-color);
      font-size: 1.1rem;
      font-weight: 700;
    }

    .fields-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.75rem;
    }

    .field-tag {
      background: #253352;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 0.25rem 0.7rem;
      font-size: 0.8rem;
      color: #cbd5e1;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .field-tag:hover, .field-tag.active {
      background: var(--accent-color-muted-bg);
      border-color: var(--accent-color);
      color: #ffffff;
    }

    /* ── Plot Section ── */
    #plots-section {
      max-width: 860px;
      margin: 0 auto;
    }

    .plot-container {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 1rem 1.25rem 1.25rem;
      margin-bottom: 1.5rem;
    }

    .plot-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .plot-field-title {
      color: #ffffff;
      font-size: 1rem;
      font-weight: 600;
    }

    .plot-img-wrapper {
      text-align: center;
    }

    .plot-img-wrapper img {
      max-width: 100%;
      border-radius: 6px;
    }

    .plot-loading {
      text-align: center;
      padding: 2rem;
      color: #64748b;
      font-size: 0.9rem;
    }

    .plot-error {
      text-align: center;
      padding: 1.5rem;
      color: #ff3366;
      font-size: 0.85rem;
    }

    #field-switcher {
      margin-top: 0.75rem;
    }

    .field-switch-toggle {
      color: #7a7d9a;
      font-size: 0.82rem;
      cursor: pointer;
      transition: color 0.15s;
    }

    .field-switch-toggle:hover {
      color: var(--accent-color);
    }

    .field-switch-options {
      display: none;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.5rem;
    }

    .field-switch-options.visible {
      display: flex;
    }


    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

        /* ── Paper Cards ── */
    #papers-section {
      max-width: 860px;
      margin: 0 auto;
    }

    .papers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .paper-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.9rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .paper-card-title a {
      color: var(--accent-color);
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      line-height: 1.35;
    }

    .paper-card-title a:hover { text-decoration: underline; }

    .paper-card-title-plain {
      color: #e2e8f0;
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.35;
    }

    .paper-card-venue {
      color: #94a3b8;
      font-size: 0.78rem;
    }

    .paper-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .paper-card-citations {
      color: #64748b;
      font-size: 0.76rem;
    }

    .paper-card-citations span {
      color: #cbd5e1;
      font-weight: 600;
    }

    .paper-card-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .paper-card-year {
      color: #64748b;
      font-size: 0.76rem;
    }

    .paper-card-first-author {
      background: var(--accent-color-muted-bg);
      border: 1px solid var(--accent-color);
      color: var(--accent-color);
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.1rem 0.45rem;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ── Footer ── */
    .site-footer {
      margin-top: 3rem;
      padding: 1.5rem 1rem;
      border-top: 1px solid #1e293b;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 1.25rem;
    }

    .footer-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: #64748b;
      text-decoration: none;
      font-size: 0.82rem;
      transition: color 0.2s;
    }

    .footer-link:hover {
      color: var(--accent-color);
    }

    .footer-link svg {
      flex-shrink: 0;
    }

    .footer-divider {
      color: #293548;
      font-size: 0.9rem;
    }

  </style>
</head>
<body>
  <h1>Ranki</h1>
  <p class="subtitle">Score your influence!</p>

  <div class="search-wrapper">
    <input
      id="search-input"
      type="text"
      placeholder="Search by author name…"
      autocomplete="off"
    />
    <div id="dropdown">
      <div id="dropdown-status"></div>
    </div>
  </div>

  <div id="author-card">
    <div class="card" id="author-info"></div>
  </div>

  <div id="plots-section"></div>
  <div id="papers-section"></div>
