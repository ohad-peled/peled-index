<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranki</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0e27;
      color: #cccccc;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      color: #ffffff;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      letter-spacing: 0.02em;
    }

    .subtitle {
      text-align: center;
      color: #8b8fb8;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    /* ── Search ── */
    .search-wrapper {
      position: relative;
      max-width: 560px;
      margin: 0 auto 2rem;
    }

    #search-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #111827;
      border: 1px solid #1e2a4a;
      border-radius: 8px;
      color: #ffffff;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #search-input:focus {
      border-color: #00d9ff;
    }

    #search-input::placeholder { color: #7a7d9a; }

    /* ── Dropdown ── */
    #dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #111827;
      border: 1px solid #1e2a4a;
      border-radius: 8px;
      overflow: hidden;
      z-index: 100;
      display: none;
      max-height: 320px;
      overflow-y: auto;
    }

    #dropdown.visible { display: block; }

    .dropdown-item {
      padding: 0.65rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid #131929;
      transition: background 0.15s;
    }

    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: #151d35; }

    .dropdown-item .item-name {
      color: #ffffff;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .dropdown-item .item-meta {
      color: #a0a3c0;
      font-size: 0.8rem;
      margin-top: 2px;
    }

    .dropdown-item .item-score {
      float: right;
      color: #00d9ff;
      font-weight: 700;
      font-size: 0.9rem;
    }

    #dropdown-status {
      padding: 0.65rem 1rem;
      color: #8b8fb8;
      font-size: 0.85rem;
      text-align: center;
    }

    /* ── Author Card ── */
    #author-card {
      max-width: 860px;
      margin: 0 auto;
      display: none;
    }

    #author-card.visible { display: block; }

    .card {
      background: #111827;
      border: 1px solid #1e2a4a;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      color: #ffffff;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .card .institution {
      color: #a0a3c0;
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
    }

    .stats-row {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-label {
      color: #7a7d9a;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stat-value {
      color: #00d9ff;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .fields-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.75rem;
    }

    .field-tag {
      background: #151d35;
      border: 1px solid #252d50;
      border-radius: 20px;
      padding: 0.25rem 0.7rem;
      font-size: 0.8rem;
      color: #b8bcdc;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .field-tag:hover, .field-tag.active {
      background: #0096ff;
      border-color: #00d9ff;
      color: #ffffff;
    }

    /* ── Plot Section ── */
    #plots-section {
      max-width: 860px;
      margin: 0 auto;
    }

    .plot-container {
      background: #111827;
      border: 1px solid #1e2a4a;
      border-radius: 10px;
      padding: 1rem 1.25rem 1.25rem;
      margin-bottom: 1.5rem;
    }

    .plot-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .plot-field-title {
      color: #ffffff;
      font-size: 1rem;
      font-weight: 600;
    }

    .plot-stats {
      display: flex;
      gap: 1rem;
      font-size: 0.82rem;
    }

    .plot-stat {
      color: #a0a3c0;
    }

    .plot-stat span {
      color: #00d9ff;
      font-weight: 600;
    }

    .plot-img-wrapper {
      text-align: center;
    }

    .plot-img-wrapper img {
      max-width: 100%;
      border-radius: 6px;
    }

    .plot-loading {
      text-align: center;
      padding: 2rem;
      color: #7a7d9a;
      font-size: 0.9rem;
    }

    .plot-error {
      text-align: center;
      padding: 1.5rem;
      color: #ff3366;
      font-size: 0.85rem;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0e27; }
    ::-webkit-scrollbar-thumb { background: #1e2a4a; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>Peled Index</h1>
  <p class="subtitle">Find out if you stand out!</p>

  <div class="search-wrapper">
    <input
      id="search-input"
      type="text"
      placeholder="Search by author name…"
      autocomplete="off"
    />
    <div id="dropdown">
      <div id="dropdown-status"></div>
    </div>
  </div>

  <div id="author-card">
    <div class="card" id="author-info"></div>
  </div>

  <div id="plots-section"></div>

  <script src="app.js"></script>
</body>
</html>
